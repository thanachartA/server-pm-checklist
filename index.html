  .stat-yellow { color: var(--yellow); }

async function supaFetch(table, method, params = {}) {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=representation' : 'return=representation'
  };
  let url = `${SUPABASE_URL}/rest/v1/${table}`;
  if (params.query) url += `?${params.query}`;

  const opts = { method, headers };
  if (params.body) opts.body = JSON.stringify(params.body);

  const res = await fetch(url, opts);
  if (!res.ok) {
    const err = await res.text();
    console.error(`Supabase error: ${res.status}`, err);
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

function scheduleSave(type) {
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToDB(type), 600);
}

function setSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (status === 'ok') { el.className = 'sync-status sync-ok'; el.textContent = '● Saved'; }
  else if (status === 'saving') { el.className = 'sync-status sync-saving'; el.textContent = '● Saving...'; }
  else if (status === 'error') { el.className = 'sync-status sync-error'; el.textContent = '● Error'; }
}

// --- DB OPERATIONS ---
async function loadMonth() {
  currentMonth = document.getElementById('selectedMonth').value;
  if (!currentMonth) return;
  document.getElementById('loadingOverlay').style.display = 'flex';

  try {
    // Load all 3 tables in parallel
    const [clRows, svRows, soRows] = await Promise.all([
      supaFetch('pm_checklist', 'GET', { query: `month=eq.${currentMonth}&select=*` }),
      supaFetch('pm_server_status', 'GET', { query: `month=eq.${currentMonth}&select=*` }),
      supaFetch('pm_signoff', 'GET', { query: `month=eq.${currentMonth}&select=*` }),
    ]);

    checklistData = {};
    clRows.forEach(r => {
      checklistData[r.item_id] = { status: r.status||'', result: r.result||'', inspector: r.inspector||'', date: r.check_date||'', note: r.note||'' };
    });

    serverData = {};
    svRows.forEach(r => {
      serverData[r.server_name] = { hardware: r.hardware||'', os: r.os||'', network: r.network||'', access_ctrl: r.access_ctrl||'', note: r.note||'', inspector: r.inspector||'' };
    });

    signoffData = soRows.length > 0 ? {
      technician: soRows[0].technician||'', supervisor: soRows[0].supervisor||'',
      department: soRows[0].department||'IT', startDate: soRows[0].start_date||'',
      endDate: soRows[0].end_date||'', downtime: soRows[0].downtime||'',
      result: soRows[0].result||'', issues: soRows[0].issues||'', actionPlan: soRows[0].action_plan||''
    } : {};

    setSyncStatus('ok');
    renderAll();
  } catch(e) {
    console.error('Load error:', e);
    setSyncStatus('error');
    showToast('โหลดข้อมูลไม่สำเร็จ', 'error');
  } finally {
    document.getElementById('loadingOverlay').style.display = 'none';
  }
}

async function saveToDB(type) {
  try {
    if (type === 'checklist') {
      const rows = Object.entries(checklistData).map(([itemId, d]) => ({
        month: currentMonth, item_id: itemId,
        status: d.status||'', result: d.result||'', inspector: d.inspector||'',
        check_date: d.date || null, note: d.note||'', updated_at: new Date().toISOString()
      }));
      if (rows.length) await supaFetch('pm_checklist', 'POST', { query: 'on_conflict=month,item_id', body: rows });
    }
    else if (type === 'server') {
      const rows = Object.entries(serverData).map(([name, d]) => ({
        month: currentMonth, server_name: name,
        hardware: d.hardware||'', os: d.os||'', network: d.network||'', access_ctrl: d.access_ctrl||'',
        note: d.note||'', inspector: d.inspector||'', updated_at: new Date().toISOString()
      }));
      if (rows.length) await supaFetch('pm_server_status', 'POST', { query: 'on_conflict=month,server_name', body: rows });
    }
    else if (type === 'signoff') {
      const d = signoffData;
      await supaFetch('pm_signoff', 'POST', { query: 'on_conflict=month', body: [{
        month: currentMonth, technician: d.technician||'', supervisor: d.supervisor||'',
        department: d.department||'IT', start_date: d.startDate||null, end_date: d.endDate||null,
        downtime: d.downtime||'', result: d.result||'', issues: d.issues||'',
        action_plan: d.actionPlan||'', updated_at: new Date().toISOString()
      }]});
    }
    setSyncStatus('ok');
  } catch(e) {
    console.error('Save error:', e);
    setSyncStatus('error');
    showToast('บันทึกไม่สำเร็จ', 'error');
  }
}

// --- RENDER ---
function renderAll() { renderStats(); renderChecklist(); renderServers(); renderSignoff(); }

function getChecklistStats() {
  let total=0, pass=0, fail=0, na=0, pending=0;
  checklistSections.forEach(s => s.items.forEach(i => {
    total++;
    const v = checklistData[i.id]?.status || '';
    if(v==='pass')pass++; else if(v==='fail')fail++; else if(v==='na')na++; else pending++;
  }));
  return {total,pass,fail,na,pending};
}

function getServerStats() {
  let total=0, pass=0, fail=0, na=0, pending=0;
  servers.forEach(s => serverCols.forEach(c => {
    total++;
    const v = serverData[s.name]?.[c] || '';
    if(v==='pass')pass++; else if(v==='fail')fail++; else if(v==='na')na++; else pending++;
  }));
  return {total,pass,fail,na,pending};
}

function renderStats() {
  const cs = getChecklistStats(), ss = getServerStats();
  const totalItems = cs.total + ss.total;
  const totalDone = cs.pass+cs.fail+cs.na+ss.pass+ss.fail+ss.na;
  const pct = totalItems ? Math.round(totalDone/totalItems*100) : 0;
  const progressClass = pct===100?'progress-green':pct>50?'progress-yellow':'progress-red';

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">ความคืบหน้า</div>
      <div class="stat-value stat-blue">${pct}%</div>
      <div class="progress-wrap"><div class="progress-bar ${progressClass}" style="width:${pct}%"></div></div>
      <div class="stat-sub" style="margin-top:4px">${totalDone} / ${totalItems} รายการ</div>
    </div>
    <div class="stat-card"><div class="stat-label">Checklist ผ่าน</div><div class="stat-value stat-green">${cs.pass}</div><div class="stat-sub">จาก ${cs.total} รายการ</div></div>
    <div class="stat-card"><div class="stat-label">Server ผ่าน</div><div class="stat-value stat-green">${ss.pass}</div><div class="stat-sub">จาก ${ss.total} จุดตรวจ</div></div>
    <div class="stat-card"><div class="stat-label">พบปัญหา</div><div class="stat-value stat-red">${cs.fail+ss.fail}</div><div class="stat-sub">ต้องแก้ไข</div></div>
    <div class="stat-card"><div class="stat-label">รอตรวจสอบ</div><div class="stat-value stat-yellow">${cs.pending+ss.pending}</div><div class="stat-sub">ยังไม่ได้ตรวจ</div></div>`;
}

function renderChecklist() {
  let html = '';
  checklistSections.forEach(sec => {
    let secPass=0, secFail=0, secTotal=sec.items.length;
    sec.items.forEach(i => { const v=checklistData[i.id]?.status||''; if(v==='pass')secPass++; if(v==='fail')secFail++; });
    const badgeClass = secFail>0?'badge-red':secPass===secTotal?'badge-green':'badge-gray';
    const badgeText = secFail>0?`${secFail} Fail`:secPass===secTotal?'Complete':`${secPass}/${secTotal}`;

    html += `<div class="section">
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <div class="section-title"><span>${sec.icon}</span><span>${sec.title}</span>
          <span class="section-badge ${badgeClass}">${badgeText}</span></div>
        <span class="chevron open" id="chev-${sec.id}">▶</span>
      </div>
      <div class="section-body" id="body-${sec.id}">
        <table class="checklist-table"><thead><tr>
          <th style="width:60px">#</th><th style="width:180px">รายการตรวจ</th><th>รายละเอียด</th>
          <th style="width:110px">สถานะ</th><th style="width:140px">ผลตรวจสอบ</th>
          <th style="width:100px">ผู้ตรวจ</th><th style="width:110px">วันที่</th><th style="width:140px">หมายเหตุ</th>
        </tr></thead><tbody>`;

    sec.items.forEach(item => {
      const d = checklistData[item.id] || {};
      const sc = d.status==='pass'?'pass':d.status==='fail'?'fail':d.status==='na'?'na':'';
      html += `<tr>
        <td class="item-id">${item.id}</td><td class="item-name">${item.name}</td><td class="item-desc">${item.desc}</td>
        <td><select class="status-select ${sc}" onchange="updCL('${item.id}','status',this.value);this.className='status-select '+this.value">
          <option value="">-- เลือก --</option>
          <option value="pass" ${d.status==='pass'?'selected':''}>✓ ผ่าน</option>
          <option value="fail" ${d.status==='fail'?'selected':''}>✗ ไม่ผ่าน</option>
          <option value="na" ${d.status==='na'?'selected':''}>N/A</option></select></td>
        <td><input class="text-input" value="${d.result||''}" onchange="updCL('${item.id}','result',this.value)" placeholder="ผลตรวจ"></td>
        <td><input class="text-input text-input-sm" value="${d.inspector||''}" onchange="updCL('${item.id}','inspector',this.value)" placeholder="ชื่อ"></td>
        <td><input type="date" class="text-input text-input-sm" value="${d.date||''}" onchange="updCL('${item.id}','date',this.value)"></td>
        <td><input class="text-input" value="${d.note||''}" onchange="updCL('${item.id}','note',this.value)" placeholder="หมายเหตุ"></td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  document.getElementById('tab-checklist').innerHTML = html;
}

function renderServers() {
  let rows = '';
  servers.forEach(s => {
    const sd = serverData[s.name] || {};
    let cells = '';
    serverCols.forEach(col => {
      const val = sd[col] || '';
      let dotClass='dot-none', icon='—';
      if(val==='pass'){dotClass='dot-pass';icon='✓';}
      else if(val==='fail'){dotClass='dot-fail';icon='✗';}
      else if(val==='na'){dotClass='dot-na';icon='—';}
      cells += `<td><span class="status-dot ${dotClass}" onclick="cycleSV('${s.name}','${col}',this)">${icon}</span></td>`;
    });
    rows += `<tr><td>${s.name}</td>${cells}
      <td><input class="text-input" value="${sd.note||s.note}" onchange="updSV('${s.name}','note',this.value)" style="min-width:160px"></td>
      <td><input class="text-input text-input-sm" value="${sd.inspector||''}" onchange="updSV('${s.name}','inspector',this.value)" placeholder="ชื่อ"></td></tr>`;
  });

  document.getElementById('tab-servers').innerHTML = `
    <div class="section"><div class="section-body">
      <p style="margin-bottom:12px;color:var(--text-muted);font-size:13px">💡 คลิกที่ icon สถานะเพื่อเปลี่ยน: ✓ ผ่าน → ✗ ไม่ผ่าน → N/A → ยังไม่ตรวจ</p>
      <div style="overflow-x:auto"><table class="server-table"><thead><tr>
        <th style="width:200px">Server / ระบบ</th>${serverColLabels.map(l=>`<th>${l}</th>`).join('')}
        <th>หมายเหตุ</th><th style="width:100px">ผู้ตรวจ</th>
      </tr></thead><tbody>${rows}</tbody></table></div>
    </div></div>
    <div style="padding:12px 0;color:var(--text-muted);font-size:12px">✓ = ผ่าน &nbsp; ✗ = ไม่ผ่าน &nbsp; — = N/A</div>`;
}

function renderSignoff() {
  const d = signoffData;
  const rc = d.result==='Pass'?'res-pass':d.result==='Fail'?'res-fail':d.result==='Conditional'?'res-cond':'';
  document.getElementById('tab-signoff').innerHTML = `
    <div class="section">
      <div class="section-header"><div class="section-title"><span>✍️</span><span>แบบฟอร์มลงนาม / Sign-off Sheet</span></div></div>
      <div class="section-body"><div class="signoff-grid">
        <div class="signoff-field"><label>ชื่อผู้ดำเนินการ (Technician)</label>
          <input class="text-input" value="${d.technician||''}" onchange="updSO('technician',this.value)"></div>
        <div class="signoff-field"><label>ชื่อผู้ตรวจสอบ (Supervisor)</label>
          <input class="text-input" value="${d.supervisor||''}" onchange="updSO('supervisor',this.value)"></div>
        <div class="signoff-field"><label>แผนก</label>
          <input class="text-input" value="${d.department||'IT'}" onchange="updSO('department',this.value)"></div>
        <div class="signoff-field"><label>สรุปผล</label>
          <select class="result-select ${rc}" onchange="updSO('result',this.value);this.className='result-select res-'+this.value.toLowerCase().replace('conditional','cond')">
            <option value="">-- เลือก --</option>
            <option value="Pass" ${d.result==='Pass'?'selected':''}>✓ Pass</option>
            <option value="Fail" ${d.result==='Fail'?'selected':''}>✗ Fail</option>
            <option value="Conditional" ${d.result==='Conditional'?'selected':''}>⚠ Conditional</option></select></div>
        <div class="signoff-field"><label>วันที่เริ่ม PM</label>
          <input type="date" class="text-input" value="${d.startDate||''}" onchange="updSO('startDate',this.value)"></div>
        <div class="signoff-field"><label>วันที่สิ้นสุด PM</label>
          <input type="date" class="text-input" value="${d.endDate||''}" onchange="updSO('endDate',this.value)"></div>
        <div class="signoff-field"><label>Downtime (ชั่วโมง)</label>
          <input type="number" class="text-input" value="${d.downtime||''}" onchange="updSO('downtime',this.value)" placeholder="0"></div>
        <div class="signoff-field"><label>&nbsp;</label></div>
        <div class="signoff-field full"><label>ปัญหาที่พบและยังไม่ได้แก้ไข</label>
          <textarea onchange="updSO('issues',this.value)" placeholder="รายละเอียดปัญหา...">${d.issues||''}</textarea></div>
        <div class="signoff-field full"><label>แผนการดำเนินการต่อ (Action Plan)</label>
          <textarea onchange="updSO('actionPlan',this.value)" placeholder="แผนแก้ไข...">${d.actionPlan||''}</textarea></div>
      </div></div></div>`;
}

// --- UPDATE HANDLERS ---
function updCL(id, field, value) {
  if(!checklistData[id]) checklistData[id] = {};
  checklistData[id][field] = value;
  scheduleSave('checklist');
  renderStats();
}

function updSV(name, field, value) {
  if(!serverData[name]) serverData[name] = {};
  serverData[name][field] = value;
  scheduleSave('server');
  renderStats();
}

function cycleSV(name, col, el) {
  if(!serverData[name]) serverData[name] = {};
  const cur = serverData[name][col] || '';
  const cycle = {'':'pass','pass':'fail','fail':'na','na':''};
  const next = cycle[cur];
  serverData[name][col] = next;
  const icons = {pass:'✓',fail:'✗',na:'—','':'—'};
  const cls = {pass:'dot-pass',fail:'dot-fail',na:'dot-na','':'dot-none'};
  el.textContent = icons[next]; el.className = `status-dot ${cls[next]}`;
  scheduleSave('server');
  renderStats();
}

function updSO(field, value) {
  signoffData[field] = value;
  scheduleSave('signoff');
}

function toggleSection(id) {
  document.getElementById(`body-${id}`).classList.toggle('collapsed');
  document.getElementById(`chev-${id}`).classList.toggle('open');
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  btn.classList.add('active');
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast toast-${type}`; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

// --- EXPORT EXCEL ---
function exportExcel() {
  const wb = XLSX.utils.book_new();
  const ml = currentMonth;

  const clRows = [['Server PM Checklist — '+ml],[],['#','รายการตรวจสอบ','รายละเอียด','สถานะ','ผลตรวจสอบ','ผู้ตรวจ','วันที่','หมายเหตุ']];
  checklistSections.forEach(sec => {
    clRows.push([]); clRows.push([sec.title]);
    sec.items.forEach(i => {
      const d = checklistData[i.id] || {};
      const sm = {pass:'✓ ผ่าน',fail:'✗ ไม่ผ่าน',na:'N/A'};
      clRows.push([i.id, i.name, i.desc, sm[d.status]||'', d.result||'', d.inspector||'', d.date||'', d.note||'']);
    });
  });
  const ws1 = XLSX.utils.aoa_to_sheet(clRows);
  ws1['!cols'] = [{wch:6},{wch:25},{wch:50},{wch:12},{wch:20},{wch:12},{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws1, 'PM Checklist');

  const svRows = [['Server Status Summary — '+ml],[],['Server',... serverColLabels,'หมายเหตุ','ผู้ตรวจ']];
  servers.forEach(s => {
    const sd = serverData[s.name] || {};
    const sm = {pass:'✓',fail:'✗',na:'N/A'};
    svRows.push([s.name,...serverCols.map(c=>sm[sd[c]]||''), sd.note||s.note, sd.inspector||'']);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(svRows);
  ws2['!cols'] = [{wch:25},{wch:12},{wch:14},{wch:16},{wch:14},{wch:35},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Server Status');

  const so = signoffData;
  const soRows = [['Sign-off — '+ml],[],['หัวข้อ','ข้อมูล'],
    ['ผู้ดำเนินการ',so.technician||''],['ผู้ตรวจสอบ',so.supervisor||''],
    ['แผนก',so.department||'IT'],['วันที่เริ่ม',so.startDate||''],
    ['วันที่สิ้นสุด',so.endDate||''],['Downtime (ชม.)',so.downtime||''],
    ['สรุปผล',so.result||''],['ปัญหาที่พบ',so.issues||''],['Action Plan',so.actionPlan||'']];
  const ws3 = XLSX.utils.aoa_to_sheet(soRows);
  ws3['!cols'] = [{wch:30},{wch:50}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Sign-off');

  XLSX.writeFile(wb, `Server_PM_${ml}.xlsx`);
  showToast('Export Excel สำเร็จ!');
}

// --- EXPORT PDF ---
function exportPDF() {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF('landscape','mm','a4');
  const ml = currentMonth;

  doc.setFontSize(16); doc.text('Server Room PM Checklist — '+ml, 14, 15);
  doc.setFontSize(10); doc.text('IT Department', 14, 22);

  const clData = [];
  checklistSections.forEach(sec => sec.items.forEach(i => {
    const d = checklistData[i.id] || {};
    const sm = {pass:'Pass',fail:'Fail',na:'N/A'};
    clData.push([i.id, i.name, sm[d.status]||'-', d.result||'', d.inspector||'', d.date||'', d.note||'']);
  }));
  doc.autoTable({ startY:28, head:[['#','Item','Status','Result','Inspector','Date','Note']], body:clData,
    styles:{fontSize:8,cellPadding:2}, headStyles:{fillColor:[30,58,95],textColor:255},
    alternateRowStyles:{fillColor:[240,245,250]}, columnStyles:{0:{cellWidth:12},1:{cellWidth:45},2:{cellWidth:18},3:{cellWidth:40}}});

  doc.addPage();
  doc.setFontSize(14); doc.text('Server Status Summary — '+ml, 14, 15);
  const svData = [];
  servers.forEach(s => {
    const sd = serverData[s.name] || {};
    const m = {pass:'Pass',fail:'Fail',na:'N/A'};
    svData.push([s.name,...serverCols.map(c=>m[sd[c]]||'-'), sd.note||s.note||'']);
  });
  doc.autoTable({ startY:22, head:[['Server','Hardware','OS','Network','Access','Note']], body:svData,
    styles:{fontSize:7,cellPadding:2}, headStyles:{fillColor:[30,58,95],textColor:255},
    alternateRowStyles:{fillColor:[240,245,250]}, columnStyles:{0:{cellWidth:42},5:{cellWidth:55}}});

  doc.addPage();
  doc.setFontSize(14); doc.text('Sign-off — '+ml, 14, 15);
  const so = signoffData;
  doc.autoTable({ startY:22, head:[['Field','Details']],
    body:[['Technician',so.technician||''],['Supervisor',so.supervisor||''],['Department',so.department||'IT'],
      ['Start Date',so.startDate||''],['End Date',so.endDate||''],['Downtime',so.downtime||''],
      ['Result',so.result||''],['Issues',so.issues||''],['Action Plan',so.actionPlan||'']],
    styles:{fontSize:9,cellPadding:4}, headStyles:{fillColor:[30,58,95],textColor:255},
    columnStyles:{0:{cellWidth:45,fontStyle:'bold'},1:{cellWidth:180}}});

  doc.save(`Server_PM_${ml}.pdf`);
  showToast('Export PDF สำเร็จ!');
}
